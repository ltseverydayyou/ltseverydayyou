<svg width="180" height="52" viewBox="0 0 180 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="rscripts-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="rscripts-bg" x1="0" y1="0" x2="180" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111C31" />
      <stop offset="1" stop-color="#09101A" />
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="176" height="48" rx="14" fill="url(#rscripts-bg)" />
  <rect x="2.5" y="2.5" width="175" height="47" rx="13.5" fill="none" stroke="#38BDF8" stroke-width="2" stroke-dasharray="18 10" filter="url(#rscripts-glow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-56" dur="3.1s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" values="0.68;1;0.68" dur="2.4s" repeatCount="indefinite" />
  </rect>

  <rect x="12" y="10" width="32" height="32" rx="10" fill="#38BDF8" fill-opacity="0.14" />
  <image x="16" y="14" width="24" height="24" href="data:image/png;base64," />

  <text x="56" y="31" fill="#F2FAFF" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="15" font-weight="700">RScripts</text>
</svg>

<svg width="180" height="52" viewBox="0 0 180 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="spotify-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="spotify-bg" x1="0" y1="0" x2="180" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102318" />
      <stop offset="1" stop-color="#09150E" />
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="176" height="48" rx="14" fill="url(#spotify-bg)" />
  <rect x="2.5" y="2.5" width="175" height="47" rx="13.5" fill="none" stroke="#1DB954" stroke-width="2" stroke-dasharray="18 10" filter="url(#spotify-glow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-56" dur="3.1s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite" />
  </rect>

  <rect x="12" y="10" width="32" height="32" rx="16" fill="#1DB954" fill-opacity="0.18" />
  <path d="M20.5 28.7C25.3 26.4 31.2 26.6 35.7 29.2" stroke="#1DB954" stroke-width="2.6" stroke-linecap="round" />
  <path d="M21.6 24.3C25.8 22.5 31.5 22.6 35.4 24.9" stroke="#1DB954" stroke-width="2.3" stroke-linecap="round" />
  <path d="M22.5 20.1C26.1 18.8 30.7 18.8 34 20.8" stroke="#1DB954" stroke-width="2.1" stroke-linecap="round" />

  <text x="56" y="31" fill="#F3FFF7" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="15" font-weight="700">Spotify</text>
</svg>

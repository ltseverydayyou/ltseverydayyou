name: Refresh profile assets

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh README image cache-busters and Discord card
        shell: pwsh
        run: ./scripts/refresh-profile-assets.ps1

      - name: Commit updated assets
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/discord-server-card.svg
          git commit -m "chore: refresh profile assets"
          git push
